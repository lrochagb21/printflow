<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ═══════════════════════════════════════════════════════════
//  SUPABASE CONFIG + PROTEÇÃO DE ROTA
//  Cole este bloco no INÍCIO do seu <script> principal no app.html
// ═══════════════════════════════════════════════════════════

const SUPABASE_URL = 'https://gvtqanrlazvurrfgrjfp.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd2dHFhbnJsYXp2dXJyZmdyamZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMTExMTcsImV4cCI6MjA5MTY4NzExN30.PkRGx_rl58-Lsxyj4Sa1gr6T6Skfate2UYXzqOENxqQ';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

// ── PROTEÇÃO DE ROTA: redireciona para login se não autenticado ──
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    window.location.href = 'index.html';
    return;
  }
  // Sessão válida: guarda usuário globalmente
  window.currentUser = session.user;

  // Exibir nome do usuário na UI (se tiver elemento #user-name)
  const nameEl = document.getElementById('user-name');
  if (nameEl) {
    nameEl.textContent = session.user.user_metadata?.full_name
      || session.user.email.split('@')[0];
  }
  const emailEl = document.getElementById('user-email');
  if (emailEl) emailEl.textContent = session.user.email;
})();

// ── LOGOUT ────────────────────────────────────────────────────────
async function doLogout() {
  await sb.auth.signOut();
  window.location.href = 'index.html';
}

// ── LISTENER DE SESSÃO (segurança extra) ─────────────────────────
sb.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_OUT' || !session) {
    window.location.href = 'index.html';
  }
});
</script>
