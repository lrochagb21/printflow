<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PrintFlow – Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #0d0f14;
      --bg2: #13161e;
      --bg3: #1a1e29;
      --bg4: #21273a;
      --border: #2a3045;
      --text: #e8ecf4;
      --muted: #6b7592;
      --accent: #00e5a0;
      --accent2: #3d7fff;
      --danger: #ff3d5a;
      --font-mono: 'Space Mono', monospace;
      --font: 'DM Sans', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo h1 {
      font-family: var(--font-mono);
      color: var(--accent);
      font-size: 20px;
      letter-spacing: -0.5px;
    }
    .logo p {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }
    .tabs {
      display: flex;
      gap: 4px;
      background: var(--bg3);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
      border: 1px solid var(--border);
    }
    .tab {
      flex: 1;
      padding: 8px;
      text-align: center;
      border-radius: 7px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      transition: all 0.15s;
    }
    .tab.active {
      background: var(--bg4);
      color: var(--accent);
    }
    .field {
      margin-bottom: 16px;
    }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      outline: none;
      transition: border 0.15s;
    }
    .field input:focus {
      border-color: var(--accent2);
    }
    .btn {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: #0d0f14;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      font-family: var(--font);
      transition: background 0.15s;
    }
    .btn:hover { background: #00ffb3; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg {
      text-align: center;
      font-size: 12px;
      margin-top: 16px;
      min-height: 20px;
    }
    .msg.error { color: var(--danger); }
    .msg.success { color: var(--accent); }
  </style>
</head>

  <div class="tabs">
    <div class="tab active" onclick="showTab('login')" id="tab-login">Entrar</div>
    <div class="tab" onclick="showTab('register')" id="tab-register">Criar conta</div>
  </div>

  <!-- LOGIN -->
  <div id="form-login">
    <div class="field">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="seu@email.com">
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="login-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter') doLogin()">
    </div>
    <button class="btn" id="btn-login" onclick="doLogin()">Entrar</button>
  </div>

  <!-- CADASTRO -->
  <div id="form-register" style="display:none">
    <div class="field">
      <label>Nome da empresa</label>
      <input type="text" id="reg-empresa" placeholder="Ex: Prints do João">
    </div>
    <div class="field">
      <label>Seu nome</label>
      <input type="text" id="reg-name" placeholder="João Silva">
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="reg-email" placeholder="seu@email.com">
    </div>
    <div class="field">
      <label>Senha (mínimo 8 caracteres)</label>
      <input type="password" id="reg-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter') doRegister()">
    </div>
    <button class="btn" id="btn-register" onclick="doRegister()">Criar conta grátis</button>
  </div>

  <div class="msg" id="msg"></div>
</div>

<script>
  // ⚠️ Substitua pelos seus valores do Supabase (Settings → API)
  const SUPABASE_URL  = 'https://gvtqanrlazvurrfgrjfp.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd2dHFhbnJsYXp2dXJyZmdyamZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMTExMTcsImV4cCI6MjA5MTY4NzExN30.PkRGx_rl58-Lsxyj4Sa1gr6T6Skfate2UYXzqOENxqQ';

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  // Redirecionar se já está logado
  sb.auth.getSession().then(({ data }) => {
    if (data.session) location.href = 'app.html';
  });

  function showTab(tab) {
    document.getElementById('form-login').style.display    = tab === 'login'    ? '' : 'none';
    document.getElementById('form-register').style.display = tab === 'register' ? '' : 'none';
    document.getElementById('tab-login').className    = 'tab' + (tab === 'login'    ? ' active' : '');
    document.getElementById('tab-register').className = 'tab' + (tab === 'register' ? ' active' : '');
    setMsg('');
  }

  function setMsg(text, type = 'error') {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg ' + type;
  }

  async function doLogin() {
    const email = document.getElementById('login-email').value.trim();
    const pass  = document.getElementById('login-pass').value;
    if (!email || !pass) { setMsg('Preencha email e senha.'); return; }
    const btn = document.getElementById('btn-login');
    btn.disabled = true;
    btn.textContent = 'Entrando...';
    setMsg('Verificando...', 'success');
    const { error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error) {
      setMsg(error.message === 'Invalid login credentials' ? 'Email ou senha incorretos.' : error.message);
      btn.disabled = false;
      btn.textContent = 'Entrar';
      return;
    }
    setMsg('Entrando...', 'success');
    location.href = 'app.html';
  }

  async function doRegister() {
    const empresa = document.getElementById('reg-empresa').value.trim();
    const name    = document.getElementById('reg-name').value.trim();
    const email   = document.getElementById('reg-email').value.trim();
    const pass    = document.getElementById('reg-pass').value;
    if (!empresa || !name || !email || !pass) { setMsg('Preencha todos os campos.'); return; }
    if (pass.length < 8) { setMsg('A senha precisa ter pelo menos 8 caracteres.'); return; }
    const btn = document.getElementById('btn-register');
    btn.disabled = true;
    btn.textContent = 'Criando conta...';
    setMsg('Aguarde...', 'success');
    const { error } = await sb.auth.signUp({
      email,
      password: pass,
      options: { data: { empresa, name } }
    });
    if (error) {
      setMsg(error.message);
      btn.disabled = false;
      btn.textContent = 'Criar conta grátis';
      return;
    }
    setMsg('Conta criada! Redirecionando...', 'success');
    setTimeout(() => location.href = 'app.html', 1500);
  }
</script>
</body>
